<!DOCTYPE html>

  <head>
  <script>
    // Track page load performance
    (function() {
      const startTime = Date.now();

      // Track what gets loaded
      const loadedResources = {
        scripts: [],
        stylesheets: [],
        failed: []
      };

      // Monitor all script tags
      document.addEventListener('DOMContentLoaded', function() {
        const scripts = document.querySelectorAll('script[src]');
        scripts.forEach(function(script) {
          const src = script.src;

          script.addEventListener('load', function() {
            loadedResources.scripts.push(src);
            console.log('[Loading] ✅ Script loaded:', src);
          });

          script.addEventListener('error', function() {
            loadedResources.failed.push(src);
            console.error('[Loading] ❌ Script failed:', src);
          });
        });

        // Check if app root exists
        setTimeout(function() {
          const root = document.getElementById('root');
          if (!root) {
            console.error('[Loading] ❌ No root element found!');
          } else if (root.children.length === 0) {
            console.error('[Loading] ❌ Root element is empty - app not rendering');
            console.log('[Loading] Loaded scripts:', loadedResources.scripts.length);
            console.log('[Loading] Failed scripts:', loadedResources.failed.length);
          } else {
            console.log('[Loading] ✅ App rendered successfully');
          }
        }, 3000);
      });

      // Log page load complete
      window.addEventListener('load', function() {
        const loadTime = Date.now() - startTime;
        console.log('[Loading] Page load complete in ' + loadTime + 'ms');
      });
    })();
  </script>

  <script>
    // FORCE CACHE CLEAR - This runs immediately before anything else
    (function() {
      console.log('[CacheClear] Starting aggressive cache cleanup...');

      // 1. Unregister ALL service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          console.log('[CacheClear] Found ' + registrations.length + ' service worker(s)');
          for (let registration of registrations) {
            registration.unregister().then(function(success) {
              if (success) {
                console.log('[CacheClear] Unregistered service worker:', registration.scope);
              }
            });
          }
        });
      }

      // 2. Delete ALL caches
      if ('caches' in window) {
        caches.keys().then(function(cacheNames) {
          console.log('[CacheClear] Found ' + cacheNames.length + ' cache(s)');
          return Promise.all(
            cacheNames.map(function(cacheName) {
              console.log('[CacheClear] Deleting cache:', cacheName);
              return caches.delete(cacheName);
            })
          );
        }).then(function() {
          console.log('[CacheClear] All caches deleted');
        });
      }

      console.log('[CacheClear] Cache cleanup complete! NO RELOAD - app continues loading...');
    })();
  </script>

  <div id="mobile-debug-overlay">
    <div style="font-weight: bold; margin-bottom: 10px; color: white;">📱 Mobile Debug Console</div>
    <div id="debug-log"></div>
  </div>
  <script>
    (function() {
      // Mobile Debug Logger
      const debugOverlay = document.getElementById('mobile-debug-overlay');
      const debugLog = document.getElementById('debug-log');
      const debugToggle = document.getElementById('mobile-debug-toggle');
      let isVisible = true; // Start visible to show initial loading

      debugOverlay.classList.add('visible');

      debugToggle.addEventListener('click', function() {
        isVisible = !isVisible;
        if (isVisible) {
          debugOverlay.classList.add('visible');
        } else {
          debugOverlay.classList.remove('visible');
        }
      });

      function addLog(message, type = 'info') {
        const timestamp = new Date().toLocaleTimeString();
        const entry = document.createElement('div');
        entry.className = type;
        entry.innerHTML = '<span class="timestamp">[' + timestamp + ']</span> ' + message;
        debugLog.appendChild(entry);
        debugLog.scrollTop = debugLog.scrollHeight;
      }

      // Log initial info
      addLog('🚀 App starting...', 'info');
      addLog('User Agent: ' + navigator.userAgent, 'info');
      addLog('Screen: ' + window.innerWidth + 'x' + window.innerHeight, 'info');
      addLog('Base URL: ' + window.location.href, 'info');

      // Intercept console methods
      const originalLog = console.log;
      const originalError = console.error;
      const originalWarn = console.warn;

      console.log = function(...args) {
        addLog(args.join(' '), 'info');
        originalLog.apply(console, args);
      };

      console.error = function(...args) {
        addLog('❌ ' + args.join(' '), 'error');
        originalError.apply(console, args);
      };

      console.warn = function(...args) {
        addLog('⚠️ ' + args.join(' '), 'warning');
        originalWarn.apply(console, args);
      };

      // Catch all unhandled errors
      window.addEventListener('error', function(event) {
        addLog('❌ ERROR: ' + event.message + ' at ' + event.filename + ':' + event.lineno, 'error');
      });

      // Catch unhandled promise rejections
      window.addEventListener('unhandledrejection', function(event) {
        addLog('❌ PROMISE REJECTION: ' + (event.reason?.message || event.reason), 'error');
      });

      // Check if React bundle loads
      addLog('⏳ Waiting for React to load...', 'info');

      // Check after 3 seconds if React loaded
      setTimeout(function() {
        if (typeof React === 'undefined') {
          addLog('❌ React not loaded after 3s - bundle may have failed', 'error');
        } else {
          addLog('✅ React is loaded', 'info');
        }
      }, 3000);

      // Check after 5 seconds if app rendered
      setTimeout(function() {
        const appRoot = document.getElementById('root');
        if (appRoot && appRoot.children.length === 0) {
          addLog('❌ App root is empty - React app not rendering', 'error');
        } else if (appRoot && appRoot.children.length > 0) {
          addLog('✅ App rendered successfully', 'info');
        }
      }, 5000);

      // Log service worker status
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          if (registrations.length > 0) {
            addLog('ℹ️ Service Workers found: ' + registrations.length, 'info');
            registrations.forEach(function(reg) {
              addLog('  - Scope: ' + reg.scope, 'info');
            });
          } else {
            addLog('ℹ️ No Service Workers registered', 'info');
          }
        });
      }

      // Log cache status
      if ('caches' in window) {
        caches.keys().then(function(names) {
          if (names.length > 0) {
            addLog('ℹ️ Caches found: ' + names.join(', '), 'info');
          } else {
            addLog('ℹ️ No caches found', 'info');
          }
        });
      }

      // Check if main bundle exists
      addLog('🔍 Checking for main bundle...', 'info');
      fetch(window.location.origin + window.location.pathname + '_expo/static/js/web/entry-*.js'.replace('*', ''))
        .then(function() {
          addLog('✅ Main bundle found', 'info');
        })
        .catch(function() {
          addLog('⚠️ Could not verify main bundle', 'warning');
        });

      addLog('📊 Debug logger initialized', 'info');
    })();
  </script>

  <script>
    // This script runs IMMEDIATELY and updates the banner
    (function() {
      var statusMsg = document.getElementById('status-message');
      var banner = document.getElementById('failsafe-banner');

      // Step 1: JavaScript is running
      statusMsg.innerHTML = '✅ JavaScript läuft!';
      statusMsg.style.color = '#00ff00';

      // Step 2: Check if DOM loaded
      document.addEventListener('DOMContentLoaded', function() {
        statusMsg.innerHTML = '✅ DOM geladen! Warte auf React...';

        // Step 3: Check if React loaded after 2 seconds
        setTimeout(function() {
          if (typeof React !== 'undefined') {
            statusMsg.innerHTML = '✅ React geladen! App sollte rendern...';
          } else {
            statusMsg.innerHTML = '❌ React nicht gefunden!';
            statusMsg.style.color = '#ff4444';
          }
        }, 2000);

        // Step 4: Check if app rendered after 5 seconds
        setTimeout(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            statusMsg.innerHTML = '✅ APP FUNKTIONIERT!';
            statusMsg.style.color = '#00ff00';
            // Hide banner after success
            setTimeout(function() {
              banner.style.display = 'none';
            }, 3000);
          } else {
            statusMsg.innerHTML = '❌ APP RENDERT NICHT! Root ist leer.';
            statusMsg.style.color = '#ff4444';
            // Keep banner visible to show error
          }
        }, 5000);
      });

      // Catch any errors
      window.addEventListener('error', function(e) {
        statusMsg.innerHTML = '❌ FEHLER: ' + e.message;
        statusMsg.style.color = '#ff4444';
        banner.style.background = 'linear-gradient(135deg, #ff4444 0%, #cc0000 100%)';
      });
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/Pflanzkalender-testing/service-worker.js')
          .then(function(registration) {
            // Periodically check for updates
            setInterval(function() { registration.update(); }, 60000);

            // When a new SW is found, ask it to take over immediately
            registration.addEventListener('updatefound', function() {
              var newWorker = registration.installing;
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          })
          .catch(function(err) {
            console.error('[SW] Registration failed:', err);
          });

        // Reload once when new SW takes control (flag prevents loop)
        var reloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (!reloading) {
            reloading = true;
            window.location.reload();
          }
        });
      });
    }
  </script>
