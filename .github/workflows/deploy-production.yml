name: Deploy to Production

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npx expo export --platform web --output-dir dist
        env:
          NODE_ENV: production
          CI: true

      - name: Fix paths for GitHub Pages
        run: node scripts/fix-paths.js

      # TEMPORARILY DISABLED - causes reload loop
      # - name: Add service worker and cache-busting
      #   run: node scripts/add-service-worker.js

      # CLEAN PRODUCTION DEPLOYMENT - NO DEBUG TOOLS
      # The app works! Just deploy it normally.

      - name: Create .nojekyll
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: Production deployment'

      - name: Cleanup sensitive files from gh-pages
        run: |
          echo "🧹 Cleaning up sensitive files from gh-pages branch..."

          # Save current working directory state
          git stash --include-untracked || true

          # Checkout gh-pages branch
          git fetch origin gh-pages
          git checkout gh-pages

          # List of files/directories to remove
          FILES_TO_REMOVE=(
            "node_modules/"
            "credentials.json"
            ".env"
            ".env.*"
            ".vscode/"
            ".husky/"
            "coverage/"
            ".expo/"
            ".templates/"
            "*.log"
          )

          # Remove files if they exist
          REMOVED=0
          for item in "${FILES_TO_REMOVE[@]}"; do
            if [ -e "$item" ] || [ -d "$item" ]; then
              echo "  Removing: $item"
              rm -rf "$item"
              REMOVED=1
            fi
          done

          # Commit and push if changes were made
          if [ $REMOVED -eq 1 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "🧹 Auto-cleanup: Remove sensitive files from gh-pages" || true
            git push origin gh-pages
            echo "✅ Cleanup completed and pushed"
          else
            echo "✅ No cleanup needed - gh-pages is already clean"
          fi

          # Switch back to original branch
          git checkout -

      - name: Summary
        run: |
          echo "✅ Deployed to production!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Production URL:** https://s540d.github.io/Pflanzkalender/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ **Time:** $(date)" >> $GITHUB_STEP_SUMMARY
